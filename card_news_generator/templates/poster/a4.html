<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('{{ font_url }}');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: '{{ primary_font }}', 'Noto Sans KR', sans-serif;
    background-color: {{ bg_color }};
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8%;
    position: relative;
    color: {{ title_color }};
  }

  .poster::before {
    content: '';
    position: absolute;
    top: -15%;
    right: -15%;
    width: 55%;
    aspect-ratio: 1;
    border-radius: 50%;
    background-color: {{ accent_color }};
    opacity: 0.18;
  }

  .header {
    font-size: 3.2vw;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: {{ accent_color }};
    text-transform: uppercase;
    z-index: 1;
  }

  .body {
    z-index: 1;
  }

  .title {
    font-size: 11vw;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 4%;
    word-break: keep-all;
    color: {{ title_color }};
  }

  .subtitle {
    font-size: 4vw;
    line-height: 1.5;
    color: {{ desc_color }};
    word-break: keep-all;
    max-width: 85%;
  }

  .info {
    z-index: 1;
    border-top: 3px solid {{ accent_color }};
    padding-top: 5%;
    display: flex;
    flex-direction: column;
    gap: 1.2vw;
  }

  .info-row {
    font-size: 3vw;
    color: {{ desc_color }};
  }

  .info-row b {
    color: {{ accent_color }};
    margin-right: 1em;
    font-weight: 700;
  }

  .footer {
    margin-top: 4%;
    font-size: 2.4vw;
    color: {{ desc_color }};
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="poster">
    <div class="header">{{ badge | default('POSTER') }}</div>

    <div class="body">
      <h1 class="title">{{ title }}</h1>
      {% if subtitle %}<p class="subtitle">{{ subtitle }}</p>{% endif %}
    </div>

    <div class="info">
      {% if date_range %}<div class="info-row"><b>일시</b>{{ date_range }}</div>{% endif %}
      {% if place %}<div class="info-row"><b>장소</b>{{ place }}</div>{% endif %}
      {% if footer %}<div class="footer">{{ footer }}</div>{% endif %}
    </div>
  </div>
</body>
</html>
