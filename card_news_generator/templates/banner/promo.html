<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('{{ font_url }}');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: '{{ primary_font }}', 'Noto Sans KR', sans-serif;
  }

  .banner {
    width: 100vw;
    height: 100vh;
    background: {{ bg_color }};
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8%;
    position: relative;
    overflow: hidden;
  }

  .banner::before {
    content: "{{ bg_tagline }}";
    position: absolute;
    right: -2%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 220px;
    font-weight: 900;
    color: {{ accent_color }};
    opacity: 0.08;
    letter-spacing: -8px;
    white-space: nowrap;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 55%;
    z-index: 1;
  }

  .title {
    font-size: 54px;
    font-weight: 900;
    color: {{ title_color }};
    line-height: 1.15;
    letter-spacing: -1.5px;
  }

  .subtitle {
    font-size: 22px;
    font-weight: 400;
    color: {{ desc_color }};
    line-height: 1.5;
  }

  .right {
    z-index: 1;
  }

  .cta-button {
    background: {{ accent_color }};
    color: {{ on_primary | default('#FFFFFF') }};
    padding: 20px 40px;
    border-radius: 999px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  }

  .brand-tag {
    position: absolute;
    top: 24px;
    left: 32px;
    font-size: 14px;
    font-weight: 700;
    color: {{ accent_color }};
    opacity: 0.8;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="banner">
    {% if brand_name %}<div class="brand-tag">{{ brand_name }}</div>{% endif %}
    <div class="left">
      <div class="title">{{ title }}</div>
      {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    </div>
    <div class="right">
      <div class="cta-button">{{ cta_text }}</div>
    </div>
  </div>
</body>
</html>
