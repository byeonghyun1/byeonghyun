<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1080px;
    background-color: #F0F4FF;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }

  /* 장식 요소 - 상단 원 */
  .card::before {
    content: '';
    position: absolute;
    top: -120px;
    right: -120px;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    background-color: #3B5BDB;
    opacity: 0.15;
  }

  /* 장식 요소 - 하단 원 */
  .card::after {
    content: '';
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background-color: #3B5BDB;
    opacity: 0.1;
  }

  .badge {
    display: inline-block;
    background-color: #3B5BDB;
    color: #FFFFFF;
    font-size: 28px;
    font-weight: 700;
    padding: 12px 36px;
    border-radius: 50px;
    margin-bottom: 40px;
    letter-spacing: 2px;
    z-index: 1;
  }

  .title {
    font-size: 72px;
    font-weight: 900;
    color: #2D2D2D;
    line-height: 1.3;
    margin-bottom: 32px;
    z-index: 1;
    word-break: keep-all;
  }

  .divider {
    width: 80px;
    height: 4px;
    background-color: #3B5BDB;
    margin-bottom: 32px;
    z-index: 1;
  }

  .description {
    font-size: 32px;
    font-weight: 400;
    color: #555555;
    line-height: 1.6;
    z-index: 1;
    word-break: keep-all;
    max-width: 800px;
  }

  .footer {
    position: absolute;
    bottom: 50px;
    font-size: 22px;
    color: #555555;
    opacity: 0.6;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">채용</div>
    <h1 class="title">신입 채용 공고</h1>
    <div class="divider"></div>
    <p class="description">신뢰감</p>
    
  </div>
</body>
</html>
