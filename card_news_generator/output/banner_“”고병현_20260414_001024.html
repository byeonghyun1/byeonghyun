<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    font-family: 'Noto Sans KR', 'Noto Sans KR', sans-serif;
  }

  .banner {
    width: 100vw;
    height: 100vh;
    background: #FFF8E1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 8%;
    position: relative;
    overflow: hidden;
  }

  .banner::before {
    content: "PROMOTION";
    position: absolute;
    right: -2%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 220px;
    font-weight: 900;
    color: #FF6D00;
    opacity: 0.08;
    letter-spacing: -8px;
    white-space: nowrap;
  }

  .left {
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 55%;
    z-index: 1;
  }

  .title {
    font-size: 54px;
    font-weight: 900;
    color: #212121;
    line-height: 1.15;
    letter-spacing: -1.5px;
  }

  .subtitle {
    font-size: 22px;
    font-weight: 400;
    color: #555555;
    line-height: 1.5;
  }

  .right {
    z-index: 1;
  }

  .cta-button {
    background: #FF6D00;
    color: #FFFFFF;
    padding: 20px 40px;
    border-radius: 999px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  }

  .brand-tag {
    position: absolute;
    top: 24px;
    left: 32px;
    font-size: 14px;
    font-weight: 700;
    color: #FF6D00;
    opacity: 0.8;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="brand-tag">알바몬</div>
    <div class="left">
      <div class="title">“”고병현</div>
      
    </div>
    <div class="right">
      <div class="cta-button">자세히 보기</div>
    </div>
  </div>
</body>
</html>
