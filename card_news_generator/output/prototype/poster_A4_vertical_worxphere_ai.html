<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Noto Sans KR', 'Noto Sans KR', sans-serif;
    background-color: #E3F2FD;
  }

  .poster {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8%;
    position: relative;
    color: #212121;
  }

  .poster::before {
    content: '';
    position: absolute;
    top: -15%;
    right: -15%;
    width: 55%;
    aspect-ratio: 1;
    border-radius: 50%;
    background-color: #1565C0;
    opacity: 0.18;
  }

  .header {
    font-size: 3.2vw;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #1565C0;
    text-transform: uppercase;
    z-index: 1;
  }

  .body {
    z-index: 1;
  }

  .title {
    font-size: 11vw;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 4%;
    word-break: keep-all;
    color: #212121;
  }

  .subtitle {
    font-size: 4vw;
    line-height: 1.5;
    color: #555555;
    word-break: keep-all;
    max-width: 85%;
  }

  .info {
    z-index: 1;
    border-top: 3px solid #1565C0;
    padding-top: 5%;
    display: flex;
    flex-direction: column;
    gap: 1.2vw;
  }

  .info-row {
    font-size: 3vw;
    color: #555555;
  }

  .info-row b {
    color: #1565C0;
    margin-right: 1em;
    font-weight: 700;
  }

  .footer {
    margin-top: 4%;
    font-size: 2.4vw;
    color: #555555;
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="poster">
    <div class="header">POSTER</div>

    <div class="body">
      <h1 class="title">프리미엄 웍스피어 도입 사내 설명회</h1>
      <p class="subtitle">실무 매니저을 위한 특별한 제안</p>
    </div>

    <div class="info">
      <div class="info-row"><b>일시</b>상시</div>
      <div class="info-row"><b>장소</b>온라인</div>
      <div class="footer">자세히 보기</div>
    </div>
  </div>
</body>
</html>
