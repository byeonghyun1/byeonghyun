<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Noto Sans KR', 'Noto Sans KR', sans-serif;
  }

  .card {
    width: 1080px;
    height: 1350px;
    background-color: #E8F5E9;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 100px 80px;
    position: relative;
    overflow: hidden;
  }

  /* 장식 요소 - 상단 원 */
  .card::before {
    content: '';
    position: absolute;
    top: -140px;
    right: -140px;
    width: 420px;
    height: 420px;
    border-radius: 50%;
    background-color: #2E7D32;
    opacity: 0.15;
  }

  /* 장식 요소 - 하단 원 */
  .card::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -100px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background-color: #2E7D32;
    opacity: 0.1;
  }

  .badge {
    display: inline-block;
    background-color: #2E7D32;
    color: #FFFFFF;
    font-size: 30px;
    font-weight: 700;
    padding: 14px 40px;
    border-radius: 50px;
    margin-bottom: 56px;
    letter-spacing: 2px;
    z-index: 1;
  }

  .title {
    font-size: 86px;
    font-weight: 900;
    color: #212121;
    line-height: 1.25;
    margin-bottom: 40px;
    z-index: 1;
    word-break: keep-all;
  }

  .divider {
    width: 90px;
    height: 5px;
    background-color: #2E7D32;
    margin-bottom: 40px;
    z-index: 1;
  }

  .description {
    font-size: 36px;
    font-weight: 400;
    color: #555555;
    line-height: 1.6;
    z-index: 1;
    word-break: keep-all;
    max-width: 860px;
  }

  .footer {
    position: absolute;
    bottom: 70px;
    font-size: 24px;
    color: #555555;
    opacity: 0.6;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">EVENT</div>
    <h1 class="title">잡코리아</h1>
    <div class="divider"></div>
    <p class="description"></p>
    
  </div>
</body>
</html>
